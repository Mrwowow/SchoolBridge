services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: schoolbridge
      POSTGRES_PASSWORD: schoolbridge
      POSTGRES_DB: schoolbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolbridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: schoolbridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: schoolbridge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: schoolbridge
      MINIO_ROOT_PASSWORD: schoolbridge
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
